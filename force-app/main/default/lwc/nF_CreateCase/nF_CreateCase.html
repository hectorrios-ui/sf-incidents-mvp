<template>
    <lightning-card title="Case Management" icon-name="standard:case">
        <div class="slds-var-p-around_medium">
            <template if:true={showSuccess}>
                <div class="slds-notify slds-notify_toast slds-theme_success slds-var-m-bottom_medium" role="status">
                    <span class="slds-notify__content">
                        <h2 class="slds-text-heading_small">Case created successfully! Case #{caseNumber}</h2>
                    </span>
                </div>
            </template>

            <template if:false={showSuccess}>
                <p class="slds-var-m-bottom_medium slds-text-body_regular">
                    Create a new Case linked to this Contact.
                </p>
                <lightning-button
                    variant="neutral"
                    label="Create Case"
                    icon-name="utility:add"
                    class="custom-button"
                    onclick={handleCreateCase}
                    disabled={isLoading}>
                </lightning-button>
                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="Creating case..." size="small" class="slds-var-m-left_small"></lightning-spinner>
                </template>
            </template>

            <template if:true={errorMessage}>
                <p class="slds-text-color_error slds-var-m-top_small">{errorMessage}</p>
            </template>
        </div>
    </lightning-card>
</template>
