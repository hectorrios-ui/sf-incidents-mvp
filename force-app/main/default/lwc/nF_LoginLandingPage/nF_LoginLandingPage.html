<template>
    <div class="page">

        <!-- Nav -->
        <header class="nav">
            <div class="nav-logo">
                <span class="nav-logo-icon" aria-hidden="true">M</span>
                <span class="nav-logo-name">Meridian</span>
            </div>
            <nav class="nav-links" aria-label="Main navigation">
                <a href="#" class="nav-link" onclick={handleHome}>Home</a>
                <a href="#" class="nav-link" onclick={handleContact}>Contact Us</a>
                <button class="btn-demo" type="button" onclick={handleDemo}>
                    Ask for a Demo&nbsp;→
                </button>
            </nav>
        </header>

        <!-- Login card -->
        <main class="main">
            <section class="card" aria-labelledby="login-heading">
                <h1 id="login-heading" class="card-heading">Welcome back</h1>
                <p class="card-sub">Sign in to your Meridian account.</p>

                <!-- Email -->
                <div class="field">
                    <label class="field-label" for="email">Email address</label>
                    <input
                        id="email"
                        type="email"
                        class="field-input"
                        placeholder="you@example.com"
                        value={email}
                        oninput={handleEmailChange}
                        autocomplete="email"
                    />
                </div>

                <!-- Password -->
                <div class="field">
                    <div class="field-label-row">
                        <label class="field-label" for="password">Password</label>
                        <a href="#" class="link-forgot" onclick={handleForgotPassword}>Forgot password?</a>
                    </div>
                    <div class="field-input-wrap">
                        <input
                            id="password"
                            type={passwordInputType}
                            class="field-input field-input--password"
                            placeholder="••••••••"
                            value={password}
                            oninput={handlePasswordChange}
                            autocomplete="current-password"
                        />
                        <button
                            type="button"
                            class="btn-eye"
                            onclick={togglePassword}
                            aria-label={eyeAriaLabel}
                        >
                            <template lwc:if={showPassword}>
                                <!-- Eye-off -->
                                <svg viewBox="0 0 24 24" fill="none" class="eye-icon" aria-hidden="true">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                    <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                </svg>
                            </template>
                            <template lwc:else>
                                <!-- Eye -->
                                <svg viewBox="0 0 24 24" fill="none" class="eye-icon" aria-hidden="true">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
                                </svg>
                            </template>
                        </button>
                    </div>
                </div>

                <!-- Remember me -->
                <div class="field-check">
                    <input
                        id="remember"
                        type="checkbox"
                        class="check-input"
                        checked={rememberMe}
                        onchange={handleRememberChange}
                    />
                    <label for="remember" class="check-label">Remember me for 30 days</label>
                </div>

                <!-- Sign in -->
                <button type="button" class="btn-signin" onclick={handleSignIn}>
                    Sign in&nbsp;→
                </button>

                <!-- Divider -->
                <div class="divider" aria-hidden="true">
                    <span class="divider-line"></span>
                    <span class="divider-text">or</span>
                    <span class="divider-line"></span>
                </div>

                <!-- Google -->
                <button type="button" class="btn-google" onclick={handleGoogle}>
                    <svg viewBox="0 0 24 24" class="google-icon" aria-hidden="true">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>

                <!-- Sign up link -->
                <p class="signup-link">
                    Don't have an account?&nbsp;<a href="#" class="link-signup" onclick={handleSignUp}>Sign up for free</a>
                </p>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2026 Meridian. All rights reserved.</p>
        </footer>

    </div>
</template>
