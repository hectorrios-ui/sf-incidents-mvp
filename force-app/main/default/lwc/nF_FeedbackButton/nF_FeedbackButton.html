<template>
    <lightning-card title="UAT Feedback" icon-name="utility:feedback">
        <div class="slds-var-p-around_medium">
            <template if:true={showForm}>
                <lightning-input
                    label="Issue Name"
                    value={issueName}
                    onchange={handleNameChange}
                    required>
                </lightning-input>
                <lightning-textarea
                    label="Issue Description"
                    value={issueDescription}
                    onchange={handleDescChange}
                    class="slds-var-m-top_small"
                    required>
                </lightning-textarea>
                <lightning-combobox
                    label="Type"
                    value={selectedType}
                    options={typeOptions}
                    onchange={handleTypeChange}
                    class="slds-var-m-top_small"
                    required>
                </lightning-combobox>
                <div class="slds-var-m-top_medium">
                    <lightning-button
                        variant="brand"
                        label="Submit Feedback"
                        onclick={handleSubmit}
                        disabled={isLoading}>
                    </lightning-button>
                    <lightning-button
                        variant="neutral"
                        label="Cancel"
                        onclick={handleCancel}
                        class="slds-var-m-left_small">
                    </lightning-button>
                </div>
            </template>

            <template if:false={showForm}>
                <template if:true={showSuccess}>
                    <div class="slds-notify slds-notify_toast slds-theme_success" role="status">
                        <span class="slds-notify__content">
                            <h2 class="slds-text-heading_small">Feedback submitted! Record #{feedbackName}</h2>
                        </span>
                    </div>
                    <lightning-button
                        variant="neutral"
                        label="Submit Another"
                        onclick={handleReset}
                        class="slds-var-m-top_medium">
                    </lightning-button>
                </template>
                <template if:false={showSuccess}>
                    <p class="slds-text-body_regular slds-var-m-bottom_medium">
                        Found an issue during UAT? Submit it directly from this record.
                    </p>
                    <lightning-button
                        variant="brand"
                        label="Submit Feedback"
                        icon-name="utility:feedback"
                        onclick={handleOpen}>
                    </lightning-button>
                </template>
            </template>

            <template if:true={errorMessage}>
                <p class="slds-text-color_error slds-var-m-top_small">{errorMessage}</p>
            </template>
        </div>
    </lightning-card>
</template>
